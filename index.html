<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Melbourne Foot Traffic</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  :root {
    --bg:         #0d0f12;
    --surface:    #161920;
    --border:     #252830;
    --amber:      #f5a623;
    --amber-dim:  rgba(245,166,35,0.15);
    --red:        #e8453c;
    --green:      #3ce87a;
    --muted:      #5a6070;
    --text:       #e8eaf0;
    --subtext:    #8890a0;
    --mono:       'Space Mono', monospace;
    --sans:       'DM Sans', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); overflow:hidden; }

  /* ── HEADER ── */
  header {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    height:52px;
    background:rgba(13,15,18,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 16px; gap:12px;
  }
  .header-title {
    font-family:var(--mono); font-size:13px; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase; color:var(--amber);
  }
  .header-sub { font-size:12px; color:var(--muted); font-weight:300; }
  .header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }

  .freshness {
    font-family:var(--mono); font-size:10px; color:var(--subtext);
    text-align:right; line-height:1.4;
  }
  .freshness span { color:var(--amber); display:block; }

  /* ── MAP ── */
  #map { position:fixed; top:52px; left:0; right:0; bottom:0; }
  .leaflet-container { background:#0d0f12 !important; }
  .leaflet-tile { filter:brightness(0.35) saturate(0.3) hue-rotate(180deg) invert(1); }

  /* ── PANEL ── */
  #panel {
    position:fixed; top:62px; right:10px;
    width:260px; z-index:900;
    display:flex; flex-direction:column; gap:8px;
    max-height:calc(100vh - 72px);
  }
  .card {
    background:rgba(22,25,32,0.92);
    backdrop-filter:blur(10px);
    border:1px solid var(--border);
    border-radius:8px; padding:12px 14px;
  }
  .card-title {
    font-family:var(--mono); font-size:9px;
    letter-spacing:0.12em; text-transform:uppercase;
    color:var(--muted); margin-bottom:10px;
  }

  /* stats */
  .stats-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .stat { display:flex; flex-direction:column; gap:2px; }
  .stat-val { font-family:var(--mono); font-size:22px; font-weight:700; color:var(--amber); line-height:1; }
  .stat-label { font-size:10px; color:var(--subtext); font-weight:300; }

  .vs-badge {
    display:inline-flex; align-items:center; gap:3px;
    font-family:var(--mono); font-size:9px;
    padding:2px 5px; border-radius:3px; margin-top:2px; width:fit-content;
  }
  .vs-badge.up      { background:rgba(60,232,122,0.12); color:var(--green); }
  .vs-badge.down    { background:rgba(232,69,60,0.12);  color:var(--red); }
  .vs-badge.neutral { background:var(--amber-dim);       color:var(--amber); }

  /* top list */
  .top-list {
    display:flex; flex-direction:column; gap:6px;
    overflow-y:auto; max-height:290px;
  }
  .top-item {
    display:flex; align-items:center; gap:8px;
    padding:6px 8px; border-radius:5px; cursor:pointer;
    transition:background 0.15s; border:1px solid transparent;
  }
  .top-item:hover { background:var(--amber-dim); border-color:rgba(245,166,35,0.2); }
  .top-rank { font-family:var(--mono); font-size:9px; color:var(--muted); width:16px; flex-shrink:0; text-align:right; }
  .top-bar-wrap { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
  .top-name { font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .top-bar { height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
  .top-bar-fill { height:100%; border-radius:2px; background:var(--amber); transition:width 0.5s ease; }
  .top-count { font-family:var(--mono); font-size:11px; color:var(--amber); flex-shrink:0; text-align:right; min-width:36px; }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background:var(--surface) !important; border:1px solid var(--border) !important;
    border-radius:8px !important; box-shadow:0 8px 24px rgba(0,0,0,0.6) !important; padding:0 !important;
  }
  .leaflet-popup-tip { background:var(--surface) !important; }
  .leaflet-popup-content { margin:0 !important; width:200px !important; }
  .popup-inner { padding:12px 14px; }
  .popup-name { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--amber); margin-bottom:6px; line-height:1.3; }
  .popup-count { font-family:var(--mono); font-size:28px; font-weight:700; color:var(--text); line-height:1; }
  .popup-unit { font-size:11px; color:var(--subtext); margin-bottom:8px; }

  /* ── LOADING / ERROR ── */
  #loading {
    position:fixed; inset:0; z-index:9999; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    transition:opacity 0.4s;
  }
  #loading.hide { opacity:0; pointer-events:none; }
  .load-title { font-family:var(--mono); font-size:13px; color:var(--amber); letter-spacing:0.1em; }
  .load-sub   { font-family:var(--mono); font-size:10px; color:var(--muted); }
  .load-bar   { width:180px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
  .load-fill  { height:100%; background:var(--amber); border-radius:2px; transition:width 0.3s ease; }

  /* ── LEGEND ── */
  #legend { position:fixed; bottom:20px; left:10px; z-index:900; }
  .legend-inner {
    background:rgba(22,25,32,0.88); backdrop-filter:blur(8px);
    border:1px solid var(--border); border-radius:6px;
    padding:8px 12px; display:flex; align-items:center; gap:10px;
    font-size:10px; color:var(--subtext); font-family:var(--mono);
  }
  .legend-swatch {
    width:50px; height:6px; border-radius:3px;
    background:linear-gradient(to right, rgba(245,166,35,0.2), rgba(245,166,35,0.6), rgba(232,69,60,1));
  }

  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<div id="loading">
  <div class="load-title">MELBOURNE FOOT TRAFFIC</div>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
  <div class="load-sub" id="load-msg">Loading data…</div>
</div>

<header>
  <div class="header-title">Foot Traffic</div>
  <div class="header-sub">Melbourne CBD</div>
  <div class="header-right">
    <div class="freshness" id="freshness">—</div>
  </div>
</header>

<div id="map"></div>

<div id="panel">
  <div class="card">
    <div class="card-title">Right Now</div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-label">pedestrians/hr</div>
        <div id="stat-vs" class="vs-badge neutral" style="display:none"></div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-sensors">—</div>
        <div class="stat-label">active sensors</div>
      </div>
    </div>
  </div>

  <div class="card" style="flex:1;min-height:0;display:flex;flex-direction:column;">
    <div class="card-title">Busiest Locations</div>
    <div class="top-list" id="top-list"></div>
  </div>
</div>

<div id="legend">
  <div class="legend-inner">
    <span>Quiet</span>
    <div class="legend-swatch"></div>
    <span>Busy</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<script>
// ── MAP INIT ──────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [-37.814, 144.963],
  zoom: 15,
  zoomControl: false,
  attributionControl: false,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
L.control.attribution({ prefix: false }).addAttribution('© OpenStreetMap · City of Melbourne').addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtNum(n) {
  return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
}

function setLoad(pct, msg) {
  document.getElementById('load-fill').style.width = pct + '%';
  if (msg) document.getElementById('load-msg').textContent = msg;
}

// ── RENDER ────────────────────────────────────────────────────────────
let heatLayer   = null;
let markerStore = {};

function render(data) {
  // Freshness label
  document.getElementById('freshness').innerHTML =
    `Data as at<span>${data.fetched_at_local}</span>`;

  // Stats panel
  document.getElementById('stat-total').textContent   = fmtNum(data.total_now);
  document.getElementById('stat-sensors').textContent = data.sensor_count;

  if (data.total_avg) {
    const pct  = Math.round(((data.total_now - data.total_avg) / data.total_avg) * 100);
    const sign = pct >= 0 ? '+' : '';
    const cls  = pct > 10 ? 'up' : pct < -10 ? 'down' : 'neutral';
    const el   = document.getElementById('stat-vs');
    el.style.display  = 'inline-flex';
    el.className      = `vs-badge ${cls}`;
    el.textContent    = `${sign}${pct}% vs avg`;
  }

  // Heatmap
  if (heatLayer) map.removeLayer(heatLayer);
  Object.values(markerStore).forEach(m => map.removeLayer(m));
  markerStore = {};

  const maxCount = data.locations[0]?.count || 1;
  const points   = data.locations.map(loc => [loc.lat, loc.lng, loc.count]);

  heatLayer = L.heatLayer(points, {
    radius: 35,
    blur:   30,
    maxZoom: 17,
    max:    maxCount,
    gradient: {
      0.1: 'rgba(245,166,35,0.3)',
      0.4: 'rgba(245,166,35,0.7)',
      0.7: 'rgba(232,120,35,0.9)',
      1.0: 'rgba(232,69,60,1)',
    },
  }).addTo(map);

  // Invisible click targets over each sensor
  data.locations.forEach(loc => {
    const icon = L.divIcon({
      className: '',
      html: '<div style="width:28px;height:28px;border-radius:50%;cursor:pointer;"></div>',
      iconSize: [28, 28], iconAnchor: [14, 14],
    });

    const vs = loc.vs_pct != null
      ? `<div class="vs-badge ${loc.vs_pct > 10 ? 'up' : loc.vs_pct < -10 ? 'down' : 'neutral'}" style="margin-bottom:8px">
           ${loc.vs_pct >= 0 ? '+' : ''}${loc.vs_pct}% vs avg
         </div>`
      : '';

    const popup = `<div class="popup-inner">
      <div class="popup-name">${loc.name}</div>
      <div class="popup-count">${fmtNum(loc.count)}</div>
      <div class="popup-unit">pedestrians this hour</div>
      ${vs}
    </div>`;

    const marker = L.marker([loc.lat, loc.lng], { icon })
      .bindPopup(popup, { maxWidth: 220, minWidth: 200 });
    marker.addTo(map);
    markerStore[loc.id] = marker;
  });

  // Top 10 list
  const top10   = data.locations.slice(0, 10);
  const maxTop  = top10[0]?.count || 1;
  document.getElementById('top-list').innerHTML = top10.map((loc, i) => `
    <div class="top-item" onclick="flyTo('${loc.id}')">
      <div class="top-rank">${i + 1}</div>
      <div class="top-bar-wrap">
        <div class="top-name" title="${loc.name}">${loc.name.replace(/\s*\(.*\)/, '').trim()}</div>
        <div class="top-bar">
          <div class="top-bar-fill" style="width:${Math.round((loc.count / maxTop) * 100)}%"></div>
        </div>
      </div>
      <div class="top-count">${fmtNum(loc.count)}</div>
    </div>`).join('');
}

window.flyTo = function(id) {
  const m = markerStore[id];
  if (!m) return;
  const ll = m.getLatLng();
  map.flyTo(ll, 17, { duration: 1 });
  setTimeout(() => m.openPopup(), 1100);
};

// ── LOAD JSON ─────────────────────────────────────────────────────────
async function loadData() {
  setLoad(20, 'Loading foot-traffic.json…');
  try {
    // Cache-bust so GitHub Pages serves the latest file, not a CDN-cached copy
    const url = `data/foot-traffic.json?v=${Date.now()}`;
    const r   = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    setLoad(90, 'Rendering…');
    render(data);
    setLoad(100);
    setTimeout(() => document.getElementById('loading').classList.add('hide'), 350);
  } catch (err) {
    console.error(err);
    document.getElementById('load-msg').textContent = '⚠ Could not load foot-traffic.json — has the Python script run yet?';
    document.getElementById('load-fill').style.background = '#e8453c';
  }
}

loadData();
</script>
</body>
</html>
